# Director persona별 Case DB 참조 타이밍
# 각 archetype이 어떤 step에서 Case Graph를 들여다보는지 정의

strategist:
  label: "전략형 디렉터"
  timing: ["s4", "s5", "s6"]
  description: "초반(문제 정의)·전략(선택 근거)에 레퍼런스를 많이 씀"

provocateur:
  label: "도발형 디렉터"
  timing: ["s4", "s6", "s8"]
  description: "문제 재정의 시점과 크리에이티브 단계에서 도발적 사례 참고"

storyteller:
  label: "스토리텔링형 디렉터"
  timing: ["s2", "s3", "s7", "s8"]
  description: "초반 탐색과 후반 표현 단계에서 레퍼런스를 넓게 활용"

emotional_minimalist:
  label: "감성 미니멀리스트"
  timing: ["s3", "s7"]
  description: "타겟 인사이트와 소비자 약속 단계에서 감성적 사례 참고"

culture_hacker:
  label: "문화/트렌드형 디렉터"
  timing: ["s2", "s3", "s6", "s8"]
  description: "초반 탐색에서 넓게 깔고, 운영 단계에서 확산 패턴 비교"

performance_hacker:
  label: "퍼포먼스형 디렉터"
  timing: ["s6", "s8"]
  description: "전략 수립과 크리에이티브 단계에서 퍼포먼스 데이터 중심 참조"
