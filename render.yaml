services:
  - type: web
    name: flux-api
    runtime: python
    plan: starter
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && PYTHONPATH=. uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: prod
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        value: "https://flux-app.vercel.app"
      - key: RAW_DATA_DIR
        value: data/raw
      - key: EMBEDDING_PROVIDER
        value: gemini
      - key: EMBEDDING_MODEL
        value: text-embedding-004
      - key: EMBEDDING_DIMENSION
        value: "768"
      # Secrets — set via Render dashboard
      - key: DATABASE_URL
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
